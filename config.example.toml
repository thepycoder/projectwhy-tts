# Required: every key below must be present (see dataclasses in projectwhy/config.py).
# Copy to config.toml and edit; the app exits if no config file is found.

[tts]
engine = "kokoro"
voice = "af_heart"
device = "cpu"

[tts.openai]
api_key = ""
base_url = "https://api.openai.com/v1"
model = "tts-1"
voice = "alloy"
format = "mp3"

[tts.mistral]
api_key = ""
model = "voxtral-mini-tts-2603"
voice_id = ""
format = "wav"

[layout]
# PP-DocLayout-S, PP-DocLayout-M, or PP-DocLayout-L
model_name = "PP-DocLayout-M"
# Optional: directory with local Paddle layout model weights (otherwise auto-download)
model_dir = ""
confidence = 0.25
# e.g. "cpu", "gpu", "gpu:0" — omit to let Paddle pick a default
device = ""
layout_nms = true
# Some CPU builds crash with oneDNN; keep false unless you know yours works
enable_mkldnn = false

[display]
pdf_scale = 2.0
highlight_color = [255, 200, 0, 128]
# "word" = word highlight when TTS provides timestamps; "block" = always block-level (PDF hover + click too)
highlight_granularity = "word"
# EPUB / plain-text reader: "light", "sepia", or "dark"
epub_theme = "light"
epub_font_size = 17
epub_line_height = 1.6
# Max width in pixels of the text column (520–1400)
epub_column_max_width = 1000

# Playback: TTS audio cache size, speakable-block lookahead, and tempo (also in Settings…)
[reading]
tts_cache_max_entries = 64
prefetch_lookahead = 3
# 0.5–2.0 in 0.25 steps; Rubber Band pitch-preserving time stretch when not 1.0
playback_speed = 1.0

[pdf_text]
line_break_marker = "\ufffe"
soft_hyphen_continuation = "\u00ad"

[blocks.types]

[substitutions]
# Add find-and-replace rules applied to each word before TTS synthesis.
# 'regex = true' enables Python re.sub on the find pattern (group references work in replace).
# rules = [{find = "CO2", replace = "Carbon Dioxide", regex = false}]
